name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 23 * * *" # 北京时间每天早上7点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 同步上游（彻底清除所有上游工作流文件）
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git remote add upstream https://github.com/364254633/edgetunnel.git
          git fetch upstream
          
          # 1. 拉取上游所有文件
          git checkout upstream/main -- .
          
          # 2. 关键：彻底删除整个.github目录（包括上游新增的所有工作流）
          rm -rf .github
          
          # 3. 恢复你自己的.github目录（只保留你的upstream-sync.yml）
          git checkout HEAD -- .github/
          
          # 4. 提交并推送
          git add .
          git commit -m "同步上游最新代码" || echo "没有需要同步的更新"
          git push origin main --force
